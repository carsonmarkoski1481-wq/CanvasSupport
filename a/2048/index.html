<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <style>
        body {
            background-color: #faf8ef;
            color: #776e65;
            font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            width: 400px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 60px;
            margin: 0;
        }

        .score-container {
            background-color: #bbada0;
            padding: 10px 20px;
            border-radius: 3px;
            color: white;
            text-align: center;
        }

        .score-label {
            text-transform: uppercase;
            font-size: 13px;
            display: block;
        }

        .score-value {
            font-size: 25px;
            font-weight: bold;
        }

        .grid-container {
            background-color: #bbada0;
            width: 400px;
            height: 400px;
            border-radius: 6px;
            position: relative;
            padding: 15px;
            box-sizing: border-box;
        }

        .grid-row {
            display: flex;
            margin-bottom: 15px;
        }

        .grid-row:last-child {
            margin-bottom: 0;
        }

        .grid-cell {
            width: 81.25px;
            height: 81.25px;
            margin-right: 15px;
            background-color: rgba(238, 228, 218, 0.35);
            border-radius: 3px;
        }

        .grid-cell:last-child {
            margin-right: 0;
        }

        .tile-container {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
        }

        .tile {
            position: absolute;
            width: 81.25px;
            height: 81.25px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            font-weight: bold;
            transition: transform 100ms ease-in-out, background-color 100ms ease-in-out;
        }

        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: white; }
        .tile-16 { background: #f59563; color: white; }
        .tile-32 { background: #f67c5f; color: white; }
        .tile-64 { background: #f65e3b; color: white; }
        .tile-128 { background: #edcf72; color: white; font-size: 30px; }
        .tile-256 { background: #edcc61; color: white; font-size: 30px; }
        .tile-512 { background: #edc850; color: white; font-size: 30px; }
        .tile-1024 { background: #edc53f; color: white; font-size: 25px; }
        .tile-2048 { background: #edc22e; color: white; font-size: 25px; }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.73);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 6px;
            display: none;
        }

        .game-over p {
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .retry-button {
            background-color: #8f7a66;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>2048</h1>
            <div class="score-container">
                <span class="score-label">Score</span>
                <span id="score" class="score-value">0</span>
            </div>
        </div>
        <div class="grid-container">
            <div class="grid-row">
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
            </div>
            <div class="grid-row">
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
            </div>
            <div class="grid-row">
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
            </div>
            <div class="grid-row">
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
            </div>
            <div id="tile-container" class="tile-container"></div>
            <div id="game-over" class="game-over">
                <p>Game Over!</p>
                <button class="retry-button" onclick="resetGame()">Try Again</button>
            </div>
        </div>
    </div>

    <script>
        let grid = [];
        let score = 0;
        const size = 4;

        function initGame() {
            grid = Array(size).fill().map(() => Array(size).fill(0));
            score = 0;
            updateScore();
            addRandomTile();
            addRandomTile();
            render();
        }

        function addRandomTile() {
            const emptyCells = [];
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (grid[r][c] === 0) emptyCells.push({ r, c });
                }
            }
            if (emptyCells.length > 0) {
                const { r, c } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function render() {
            const container = document.getElementById('tile-container');
            container.innerHTML = '';
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (grid[r][c] !== 0) {
                        const tile = document.createElement('div');
                        tile.className = `tile tile-${grid[r][c]}`;
                        tile.textContent = grid[r][c];
                        tile.style.transform = `translate(${c * 96.25}px, ${r * 96.25}px)`;
                        container.appendChild(tile);
                    }
                }
            }
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        function move(direction) {
            let moved = false;
            const newGrid = JSON.parse(JSON.stringify(grid));

            if (direction === 'left' || direction === 'right') {
                for (let r = 0; r < size; r++) {
                    let row = newGrid[r].filter(v => v !== 0);
                    if (direction === 'right') row.reverse();
                    
                    for (let i = 0; i < row.length - 1; i++) {
                        if (row[i] === row[i+1]) {
                            row[i] *= 2;
                            score += row[i];
                            row.splice(i + 1, 1);
                            moved = true;
                        }
                    }
                    
                    while (row.length < size) row.push(0);
                    if (direction === 'right') row.reverse();
                    if (JSON.stringify(newGrid[r]) !== JSON.stringify(row)) moved = true;
                    newGrid[r] = row;
                }
            } else {
                for (let c = 0; c < size; c++) {
                    let col = [];
                    for (let r = 0; r < size; r++) col.push(newGrid[r][c]);
                    col = col.filter(v => v !== 0);
                    if (direction === 'down') col.reverse();
                    
                    for (let i = 0; i < col.length - 1; i++) {
                        if (col[i] === col[i+1]) {
                            col[i] *= 2;
                            score += col[i];
                            col.splice(i + 1, 1);
                            moved = true;
                        }
                    }
                    
                    while (col.length < size) col.push(0);
                    if (direction === 'down') col.reverse();
                    
                    for (let r = 0; r < size; r++) {
                        if (newGrid[r][c] !== col[r]) moved = true;
                        newGrid[r][c] = col[r];
                    }
                }
            }

            if (moved) {
                grid = newGrid;
                addRandomTile();
                updateScore();
                render();
                if (isGameOver()) {
                    document.getElementById('game-over').style.display = 'flex';
                }
            }
        }

        function isGameOver() {
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (grid[r][c] === 0) return false;
                    if (r < size - 1 && grid[r][c] === grid[r+1][c]) return false;
                    if (c < size - 1 && grid[r][c] === grid[r][c+1]) return false;
                }
            }
            return true;
        }

        function resetGame() {
            document.getElementById('game-over').style.display = 'none';
            initGame();
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') move('left');
            if (e.key === 'ArrowRight') move('right');
            if (e.key === 'ArrowUp') move('up');
            if (e.key === 'ArrowDown') move('down');
        });

        initGame();
    </script>
</body>
</html>
